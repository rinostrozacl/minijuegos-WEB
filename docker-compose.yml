version: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=8080
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - VIRTUAL_HOST=gamecraft.cl
      - VIRTUAL_PORT=8080
    volumes:
      - .env:/app/.env
    restart: always
