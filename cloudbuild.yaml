steps:
  # Construir la imagen con Docker
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/gamecraft", "."]

  # Enviar la imagen a Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/gamecraft"]

  # Desplegar en Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "gamecraft"
      - "--image=gcr.io/$PROJECT_ID/gamecraft"
      - "--platform=managed"
      - "--region=us-central1"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--timeout=300s"
      - "--set-env-vars=NODE_ENV=production"

# Variables a sustituir en tiempo de ejecución
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: gamecraft

# Imágenes a guardar en Container Registry
images:
  - "gcr.io/$PROJECT_ID/gamecraft"

# Límite de tiempo para la compilación (30 minutos)
timeout: "1800s"
