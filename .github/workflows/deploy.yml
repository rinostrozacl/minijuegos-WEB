name: Deploy Produccion - Sistema HTTPS Directo

on:
  push:
    branches: [main2]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar sistema simplificado HTTPS directo
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          command_timeout: 400m
          script: |
            cd code/web/minijuegos-WEB/

            # Actualizar código fuente
            git fetch --all
            git reset --hard origin/main
            git pull

            # Hacer ejecutable los scripts necesarios
            chmod +x docker-scripts/deploy.sh
            chmod +x docker-scripts/generate-ssl-certs.sh

            # Ejecutar el script de deploy automatizado
            # Incluye: generación SSL, build, verificación de puertos duales
            ./docker-scripts/deploy.sh
