# Copia este archivo en tu repositorio como:
# .github/workflows/deploy-exportacionjuego-pages.yml
#
# Requisitos: carpeta exportacionjuego/ en la raíz con index.html y el build WebGL.
# En GitHub: Settings → Pages → Source → GitHub Actions.

name: Deploy exportacionjuego to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "exportacionjuego/**"
      - ".github/workflows/deploy-exportacionjuego-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-exportacionjuego
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exportacionjuego

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
