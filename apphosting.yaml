runConfig:
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024
  timeout: 60s
  port: 3000

# Configuración específica para buildpacks
build:
  packageManager: yarn
  framework: nuxt
  skipDetection: true
  disableAngularBuildpack: true
  disableAngularDetection: true
  env:
    NUXT_APP: "true"
    NUXT_PUBLIC_APP_ENV: "production"
    NODE_ENV: "production"
    IS_ANGULAR: "false"
    IS_NUXT: "true"
