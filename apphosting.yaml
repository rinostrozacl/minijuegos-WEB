backend:
  sourceDirectory: .
  runtime: nodejs18
  buildCommand: yarn build
  startCommand: yarn start
  env:
    - variable: HOST
      value: "0.0.0.0"
    - variable: PORT
      value: "8080"
    - variable: NODE_ENV
      value: "production"

runConfig:
  cpu: 1
  memory: 1Gi
  maxConcurrency: 80
  minInstances: 1
  maxInstances: 10
  timeout: 60s
  port: 8080
